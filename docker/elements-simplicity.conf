# Liquid regtest config for the Simplicity spike (Elements >= 23.3).
#
# A SEPARATE node from the main spike's elementsd: the RGB demos stay
# pinned to 23.2.4, while the Simplicity experiments run against 23.3.0
# with the simplicity deployment force-activated from genesis.

chain=elementsregtest

validatepegin=0
server=1
txindex=1
acceptnonstdtxn=1
printtoconsole=1

[elementsregtest]
# RPC
rpcuser=user
rpcpassword=pass
rpcport=7042
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0

# Activate the Simplicity tapleaf deployment from genesis.
evbparams=simplicity:-1:::

initialfreecoins=2100000000000000

fallbackfee=0.00001
mintxfee=0.00001
rpcworkqueue=64
disablewallet=0
