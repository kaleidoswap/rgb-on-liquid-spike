# Liquid regtest config for the RGB-on-Liquid spike.

chain=elementsregtest

# Global settings (apply across networks)
validatepegin=0
server=1
txindex=1
acceptnonstdtxn=1
printtoconsole=1

[elementsregtest]
# RPC
rpcuser=user
rpcpassword=pass
rpcport=7041
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0

# Free coins issued at genesis to bootstrap the test wallets
initialfreecoins=2100000000000000

# Fees
fallbackfee=0.00001
mintxfee=0.00001

# Disable HTTP basic auth annoyances
rpcworkqueue=64

# Wallet
disablewallet=0
